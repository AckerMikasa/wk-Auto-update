name: Sync with upstream

on:
  schedule:
    - cron: '0 0 * * 0'   # 每周日 UTC 时间 00:00 自动运行
  workflow_dispatch:      # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          
          ref: main                            # 主分支名称（如 main、master）

      - name: Set git username and email
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/byJoey/wk-Auto-update.git 
          git fetch upstream

      - name: Merge upstream
        run: |
          git checkout main                  # 切换到主分支
          git merge upstream/main --allow-unrelated-histories -s recursive -X theirs || echo "Merge conflict or error occurred, continuing..."

      - name: Push changes
        run: |
          git push origin main               # 推送到你的 fork 仓库
